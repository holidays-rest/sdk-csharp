name: Publish

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    name: Pack & Publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore HolidaysRest.csproj

      - name: Build
        run: dotnet build HolidaysRest.csproj --no-restore --configuration Release

      - name: Pack
        run: >
          dotnet pack HolidaysRest.csproj
          --no-build
          --configuration Release
          -p:Version=${{ steps.version.outputs.VERSION }}
          --output ./nupkg

      - name: Push to NuGet.org
        run: >
          dotnet nuget push ./nupkg/*.nupkg
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      - name: Push to GitHub Packages
        run: >
          dotnet nuget push ./nupkg/*.nupkg
          --api-key ${{ secrets.GITHUB_TOKEN }}
          --source https://nuget.pkg.github.com/holidays-rest/index.json
          --skip-duplicate
