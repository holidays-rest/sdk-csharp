name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore HolidaysRest.Tests/HolidaysRest.Tests.csproj

      - name: Build
        run: dotnet build HolidaysRest.Tests/HolidaysRest.Tests.csproj --no-restore --configuration Release

      - name: Test
        run: dotnet test HolidaysRest.Tests/HolidaysRest.Tests.csproj --no-build --configuration Release --verbosity normal
